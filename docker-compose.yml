version: '3.8'

services:
  app:
    build: .
    ports:
      - '5000:5000'
    env_file:
      - .env
    volumes:
      - ./uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:5000']
      interval: 30s
      timeout: 10s
      retries: 3
