<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile - Nova Projects</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
</head>
<body>
  <div id="loader" class="loader"><div class="loader-inner"><div class="loader-spinner"></div><p class="loader-text">Nova Projects</p></div></div>

  <nav class="navbar" id="navbar">
    <div class="container nav-container">
      <a href="/" class="nav-logo"><span class="logo-icon">⚡</span><span class="logo-text">Nova</span></a>
      <div class="nav-links" id="navLinks">
        <a href="/" class="nav-link">Home</a>
        <a href="/projects" class="nav-link">Projects</a>
        <a href="/about" class="nav-link">About</a>
        <a href="/contact" class="nav-link">Contact</a>
        <div id="authNav"></div>
      </div>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle menu"><span></span><span></span><span></span></button>
    </div>
  </nav>

  <main class="dashboard-main">
    <section class="section">
      <div class="container" style="max-width:700px">
        <h1 class="fade-up" style="margin-bottom:32px">My Profile</h1>

        <div class="profile-card fade-up">
          <div class="profile-header">
            <div class="profile-avatar" id="profileAvatar"></div>
            <div>
              <h2 id="profileName"></h2>
              <p class="text-muted" id="profileEmail"></p>
              <span class="auth-badge" id="profileAuthBadge"></span>
            </div>
          </div>
        </div>

        <div class="profile-card fade-up">
          <h3 style="margin-bottom:20px">Edit Profile</h3>
          <form id="profileForm" class="auth-form">
            <div class="form-group">
              <label for="editName">Name</label>
              <input type="text" id="editName" required>
            </div>
            <div class="form-group">
              <label for="editAvatar">Avatar URL (optional)</label>
              <input type="url" id="editAvatar" placeholder="https://example.com/avatar.jpg">
            </div>
            <button type="submit" class="btn btn-primary">Save Changes</button>
          </form>
        </div>

        <div class="profile-card fade-up" id="passwordSection">
          <h3 style="margin-bottom:20px">Change Password</h3>
          <form id="changePassForm" class="auth-form">
            <div class="form-group">
              <label for="currentPass">Current Password</label>
              <input type="password" id="currentPass" required>
            </div>
            <div class="form-group">
              <label for="newPass">New Password</label>
              <input type="password" id="newPass" required minlength="6">
            </div>
            <div class="form-group">
              <label for="confirmPass">Confirm New Password</label>
              <input type="password" id="confirmPass" required minlength="6">
            </div>
            <button type="submit" class="btn btn-primary">Update Password</button>
          </form>
        </div>
      </div>
    </section>
  </main>

  <div id="toast" class="toast"></div>
  <script src="/js/app.js"></script>
  <script src="/js/user.js"></script>
</body>
</html>
