<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Favorites - Nova Projects</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
</head>
<body>
  <div id="loader" class="loader"><div class="loader-inner"><div class="loader-spinner"></div><p class="loader-text">Nova Projects</p></div></div>

  <nav class="navbar" id="navbar">
    <div class="container nav-container">
      <a href="/" class="nav-logo"><span class="logo-icon">⚡</span><span class="logo-text">Nova</span></a>
      <div class="nav-links" id="navLinks">
        <a href="/" class="nav-link">Home</a>
        <a href="/projects" class="nav-link">Projects</a>
        <a href="/about" class="nav-link">About</a>
        <a href="/contact" class="nav-link">Contact</a>
        <div id="authNav"></div>
      </div>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle menu"><span></span><span></span><span></span></button>
    </div>
  </nav>

  <main>
    <section class="section">
      <div class="container">
        <div class="fade-up" style="margin-bottom:32px">
          <h1>My Favorites</h1>
          <p class="text-muted">Projects you've saved</p>
        </div>
        <div id="favoritesGrid" class="projects-grid">
          <div class="loading-placeholder">Loading favorites...</div>
        </div>
      </div>
    </section>
  </main>

  <div id="toast" class="toast"></div>
  <script src="/js/app.js"></script>
  <script src="/js/user.js"></script>
</body>
</html>
