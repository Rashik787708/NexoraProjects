<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Nova Projects</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
</head>
<body>
  <div id="loader" class="loader"><div class="loader-inner"><div class="loader-spinner"></div><p class="loader-text">Nova Projects</p></div></div>

  <nav class="navbar" id="navbar">
    <div class="container nav-container">
      <a href="/" class="nav-logo"><span class="logo-icon">⚡</span><span class="logo-text">Nova</span></a>
      <div class="nav-links" id="navLinks">
        <a href="/" class="nav-link">Home</a>
        <a href="/projects" class="nav-link">Projects</a>
        <a href="/admin/login" class="nav-link active">Admin</a>
      </div>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle menu"><span></span><span></span><span></span></button>
    </div>
  </nav>

  <main>
    <section class="auth-section">
      <div class="auth-card fade-up">
        <div class="auth-header">
          <div class="auth-icon">🔐</div>
          <h1>Admin Login</h1>
          <p>Sign in to access the dashboard</p>
        </div>
        <form id="loginForm" class="auth-form">
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" required placeholder="admin@nova">
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" required placeholder="Password">
          </div>
          <div class="form-check">
            <label class="checkbox-label">
              <input type="checkbox" id="rememberMe">
              <span>Remember me</span>
            </label>
          </div>
          <button type="submit" class="btn btn-primary btn-full">Sign In</button>
        </form>
      </div>
    </section>
  </main>

  <div id="toast" class="toast"></div>
  <script src="/js/app.js"></script>
  <script src="/js/admin.js"></script>
</body>
</html>
